syntax = "proto3";

package globalquake;

option java_package = "com.aloys23.globalquakemonitor.proto";
option java_outer_classname = "WebSocketProto";
option java_multiple_files = true;

// 统一的 WebSocket 消息外层结构
message WsMessage {
  MessageType type = 1;
  MessageAction action = 2;
  int64 timestamp_ms = 3;
  
  // 消息负载 (OneOf)
  oneof payload {
    EarthquakeData earthquake_data = 4;
    StatusData status_data = 5;
    HeartbeatData heartbeat_data = 6;
  }
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  EARTHQUAKE = 1;
  STATUS = 2;
  HEARTBEAT = 3;
}

enum MessageAction {
  ACTION_UNSPECIFIED = 0;
  UPDATE = 1;
  CONNECTED = 2;
  DISCONNECTED = 3;
  PING = 4;
  PONG = 5;
}

// --- 数据负载定义 ---
message EarthquakeData {
  string id = 1;             // 地震唯一标识 (UUID)
  double latitude = 2;       // 纬度
  double longitude = 3;      // 经度
  double depth = 4;          // 深度 (km)
  double magnitude = 5;      // 震级
  int64 origin_time_ms = 6;  // 发震时间 (毫秒时间戳)
  string origin_time_iso = 7;// 发震时间 (ISO 格式)
  int64 last_update_ms = 8;  // 最后更新时间
  int32 revision_id = 9;     // 版本号
  string region = 10;        // 地区描述
  bool fixed_depth = 11;     // 是否固定深度
  double max_pga = 12;       // 最大 PGA (Gal)
  string intensity = 13;     // 烈度等级
  
  ClusterInfo cluster = 14;  // 集群信息
  QualityInfo quality = 15;  // 质量信息
  StationCountInfo station_count = 16; // 台站统计
  DepthConfidenceInfo depth_confidence = 17;
}

message StatusData {
  string server_status = 1;  // 服务器状态 (CONNECTED / DISCONNECTED)
}

message HeartbeatData {
  int64 server_time = 1;     // 服务器当前时间
}

message ClusterInfo {
  string id = 1;
  double latitude = 2;
  double longitude = 3;
  int32 level = 4;
}

message QualityInfo {
  float err_origin = 1;
  float err_depth = 2;
  float err_ns = 3;
  float err_ew = 4;
  float pct = 5;
  int32 stations = 6;
}

message StationCountInfo {
  int32 total = 1;
  int32 selected = 2;
  int32 used = 3;
  int32 matching = 4;
}

message DepthConfidenceInfo {
  float min_depth = 1;
  float max_depth = 2;
}
