<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      background: #e9eef5;
      color: #152033;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }
    #daily-card {
      width: 860px;
      overflow: hidden;
      border: 1px solid #d7e0ea;
      border-radius: 16px;
      background: #f7f9fc;
      box-shadow: 0 20px 52px rgba(31, 45, 61, 0.15);
    }
    .bar {
      height: 7px;
      background: linear-gradient(90deg, #2f80ed 0 34%, #10a37f 34% 67%, #f59e0b 67% 100%);
    }
    .header {
      padding: 26px 34px 20px;
      border-bottom: 1px solid #dde6f0;
      background:
        linear-gradient(135deg, rgba(47, 128, 237, 0.08), transparent 36%),
        #ffffff;
    }
    .report-title {
      margin: 0;
      color: #111827;
      font-size: 31px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .meta {
      margin-top: 9px;
      color: #7b8798;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.3;
    }
    .sections {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 22px 26px 26px;
    }
    .section {
      position: relative;
      overflow: hidden;
      border: 1px solid #dce5ef;
      border-radius: 12px;
      background: #ffffff;
    }
    .section:only-child,
    .section-full,
    .section:nth-child(3) {
      grid-column: 1 / -1;
    }
    .section::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--accent, #2f80ed);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 17px 24px 0 28px;
    }
    .section-title {
      margin: 0;
      color: #172033;
      font-size: 21px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .badge {
      flex: none;
      border: 1px solid #d8e4f2;
      border-radius: 999px;
      padding: 6px 11px;
      background: #eef5ff;
      color: #2f5f9f;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }
    .section-body {
      margin: 11px 0 0;
      padding: 0 22px 18px 28px;
      white-space: pre-wrap;
      color: #263248;
      font-size: 16px;
      font-weight: 650;
      line-height: 1.45;
      letter-spacing: 0;
      font-family: inherit;
    }
    .game-grid,
    .pw-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0 0;
      padding: 0 18px 18px 28px;
    }
    .game-player,
    .pw-player {
      overflow: hidden;
      border: 1px solid #dce5ef;
      border-radius: 10px;
      background: #fbfdff;
    }
    .game-player {
      padding: 12px;
    }
    .player-head,
    .pw-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .player-head {
      justify-content: flex-start;
    }
    .avatar-token {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #eaf2ff;
      color: #2f80ed;
      font-size: 17px;
      font-weight: 950;
      line-height: 1;
    }
    .player-name {
      overflow: hidden;
      color: #172033;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-sub {
      margin-top: 4px;
      color: #66748a;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.15;
    }
    .game-lines {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }
    .game-line-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: #25324a;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }
    .game-line-top span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .game-line-top strong {
      flex: none;
      color: #2f5f9f;
      font-size: 13px;
      font-weight: 900;
    }
    .meter {
      height: 6px;
      overflow: hidden;
      margin-top: 6px;
      border-radius: 999px;
      background: #e8eef5;
    }
    .meter i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2f80ed, #10a37f);
    }
    .pw-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .pw-player {
      padding: 13px;
    }
    .win-pill {
      flex: none;
      min-width: 48px;
      border-radius: 999px;
      padding: 7px 9px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 950;
      line-height: 1;
      text-align: center;
    }
    .win-pill.good { background: #10a37f; }
    .win-pill.mid { background: #d97706; }
    .win-pill.bad { background: #dc2626; }
    .record-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 12px;
      color: #172033;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.2;
    }
    .record-line span {
      color: #66748a;
      font-weight: 800;
    }
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 12px;
    }
    .stat-strip div {
      border-radius: 8px;
      padding: 7px 8px;
      background: #f0f4f8;
    }
    .stat-strip span {
      display: block;
      color: #728197;
      font-size: 11px;
      font-weight: 850;
      line-height: 1;
    }
    .stat-strip strong {
      display: block;
      margin-top: 5px;
      color: #172033;
      font-size: 16px;
      font-weight: 950;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .leaderboard-grid {
      display: grid;
      gap: 8px;
      margin: 12px 0 0;
      padding: 0 18px 18px 28px;
    }
    .leaderboard-row {
      --tone: #2f80ed;
      display: grid;
      grid-template-columns: 34px 28px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 9px 14px;
      border: 1px solid #dce5ef;
      border-radius: 10px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--tone) 8%, #ffffff), #ffffff 58%);
    }
    .leaderboard-row.tone-red { --tone: #dc2626; }
    .leaderboard-row.tone-slate { --tone: #64748b; }
    .leaderboard-row.tone-blue { --tone: #2f80ed; }
    .leaderboard-row.tone-violet { --tone: #7c3aed; }
    .leaderboard-row.tone-teal { --tone: #10a37f; }
    .leaderboard-row.tone-amber { --tone: #d97706; }
    .rank-num {
      color: #7f8fa3;
      font-size: 14px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .metric-code {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 2px solid color-mix(in srgb, var(--tone) 42%, #ffffff);
      border-radius: 999px;
      color: transparent;
      font-size: 0;
      line-height: 1;
    }
    .metric-code::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: var(--tone);
      transform: rotate(45deg);
    }
    .metric-main {
      min-width: 0;
    }
    .metric-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }
    .metric-name {
      flex: none;
      border: 1px solid color-mix(in srgb, var(--tone) 22%, #dce5ef);
      border-radius: 999px;
      padding: 4px 9px;
      background: color-mix(in srgb, var(--tone) 8%, #ffffff);
      color: color-mix(in srgb, var(--tone) 82%, #172033);
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }
    .metric-holder {
      overflow: hidden;
      color: #111827;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .metric-value {
      display: flex;
      align-items: baseline;
      gap: 3px;
      color: #263248;
      font-size: 16px;
      font-weight: 850;
      line-height: 1;
      white-space: nowrap;
    }
    .metric-value span {
      color: var(--tone);
      font-size: 24px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <article id="daily-card">
    <div class="bar"></div>
    <header class="header">
      <h1 class="report-title">{{REPORT_TITLE}}</h1>
      <div class="meta">Generated {{GENERATED_AT}}</div>
    </header>
    <main class="sections">
      {{SECTIONS}}
    </main>
  </article>
</body>
</html>
